<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA4 Sample Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 20px 0;
            cursor: pointer;
        }
        .section {
            height: 800px;
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
            padding: 20px;
        }
    </style>

    <!-- ✅ GA4 TRACKING CODE (ONLY ONCE) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RETJ103D5P"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-RETJ103D5P', {
            debug_mode: true
        });

        // ✅ Button click tracking
        function trackButtonClick() {
            gtag('event', 'button_click', {
                button_name: 'Sample Button'
            });
            alert("Button Clicked!");
        }

        // ✅ Scroll tracking (50% and 100%)
        let hasScrolled50 = false;
        let hasScrolled100 = false;

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;

            if (!hasScrolled50 && scrollPercent >= 50) {
                hasScrolled50 = true;
                gtag('event', 'scroll', {
                    scroll_depth: '50%'
                });
                console.log("Scrolled 50%");
            }

            if (!hasScrolled100 && scrollPercent >= 100) {
                hasScrolled100 = true;
                gtag('event', 'scroll', {
                    scroll_depth: '100%'
                });
                console.log("Scrolled 100%");
            }
        });
    </script>
</head>

<body>
    <h1>GA4 Sample Website</h1>
    <p>This website tracks page views, button clicks, and scroll depth.</p>
    
    <button onclick="trackButtonClick()">Click Me</button>

    <div class="section">
        <h2>Section 1</h2>
        <p>Scroll down to trigger events.</p>
    </div>

    <div class="section">
        <h2>Section 2</h2>
        <p>Keep scrolling...</p>
    </div>

    <div class="section">
        <h2>Section 3</h2>
        <p>End of page → 100% scroll event.</p>
    </div>
</body>
</html>
